services:
  kano-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: kano-dashboard:latest
    container_name: kano-dashboard
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3100:3100"
    volumes:
      # Read-only mount of OpenClaw workspace
      - ~/clawd:/data:ro
      # Read-only mount of OpenClaw state directory
      - ~/.openclaw:/openclaw-state:ro
      # Tmpfs for Next.js cache
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 100M
    environment:
      - NODE_ENV=production
      - OPENCLAW_WORKSPACE=/data
      - OPENCLAW_STATE=/openclaw-state
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - kano-net

networks:
  kano-net:
    driver: bridge
